set -g default-shell "/bin/zsh"
set -g base-index 1
set -g renumber-windows on
setw -g mouse on
setw -g mode-keys vi
set-option -g display-time 4000

# status bar 
set -g status-right "Gorgeous | %Y-%m-%d %H:%M"
set -g status-style bg=colour195,fg=black
set -g status-position bottom

# source dotfile
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ============================================
# Pane 边框和标题设置
# ============================================

# 设置边框样式 - 粗边框更易识别
set -g pane-border-lines double
set -g pane-border-style 'fg=#94e2d5,bold'
set -g pane-active-border-style 'fg=#89b4fa,bold'

# Pane 标题设置 - 所有 pane 都稳定显示状态、编号和完整路径
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,FOCUS,IDLE} #{pane_index}: #{pane_current_path} '

# create window
bind-key C-n command-prompt -p "window name:" { new-window -n "%%" }

# remap prefix key 
unbind C-b 
set-option -g prefix C-q 
bind-key C-q send-prefix 

# split panes use \ and -
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# copy-mode-vi
bind c copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -n PageUp copy-mode -e \; send-keys -X page-up
bind -T copy-mode-vi PageUp send-keys -X page-up
bind -T copy-mode-vi PageDown send-keys -X page-down
# bind P paste-buffer
bind-key -T copy-mode-vi ? command-prompt -T search -p "(search down)" { send-keys -X search-forward "%%" }
bind-key -T copy-mode-vi / command-prompt -T search -p "(search up)" { send-keys -X search-backward "%%" }

# use hjkl control panes 
unbind Up
unbind Down
unbind Left
unbind Right
## previous window key
unbind l
bind Tab last-window

bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# resize pane 
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

bind C-k resize-pane -U
bind C-j resize-pane -D
bind C-h resize-pane -L
bind C-l resize-pane -R
